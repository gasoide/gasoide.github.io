<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
<title>TEST MEDIA</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #pane-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(10px);
      padding: 15px;
      z-index: 9999;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.1);
    }
  </style>
</head>
<body>

  <div id="pane-container"></div>
  <input 
    type="file" 
    id="mediaLoader" 
    accept="image/*,video/*" 
    style="position: fixed; top: 10px; left: 270px; z-index: 99999; color: white; background: #222; padding: 5px;"
  >
<input type="file" id="media1" accept="image/*,video/*" style="position:fixed; top:10px; left:270px; z-index:99999;">
<input type="file" id="media2" accept="image/*,video/*" style="position:fixed; top:40px; left:270px; z-index:99999;">
<input type="file" id="media3" accept="image/*,video/*" style="position:fixed; top:70px; left:270px; z-index:99999;">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.0/dist/tweakpane.min.js"></script>
  <script src="sketch.js?v=5000"></script>

</body>
</html>
