<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <title>VJ ENGINE</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
      font-family: sans-serif;
    }

    #pane-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 260px;
      height: 100vh;
      background: rgba(20, 20, 20, 0.85);
      backdrop-filter: blur(10px);
      padding: 15px;
      z-index: 9999;
      overflow-y: auto;
      border-right: 1px solid rgba(255,255,255,0.1);
    }

    #media-loaders {
      position: fixed;
      top: 10px;
      left: 270px;
      z-index: 99999;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    #media-loaders label {
      color: #fff;
      font-size: 12px;
      margin-bottom: 2px;
      display: block;
    }

    #media-loaders input[type="file"] {
      color: #fff;
      font-size: 11px;
    }
  </style>
</head>
<body>

  <div id="pane-container"></div>

  <div id="media-loaders">
    <div>
      <label for="media1">Layer 1</label>
      <input type="file" id="media1" accept="image/*,video/*">
    </div>
    <div>
      <label for="media2">Layer 2</label>
      <input type="file" id="media2" accept="image/*,video/*">
    </div>
    <div>
      <label for="media3">Layer 3</label>
      <input type="file" id="media3" accept="image/*,video/*">
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/addons/p5.sound.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/tweakpane@3.1.0/dist/tweakpane.min.js"></script>
  <script src="sketch.js?v=6000"></script>

</body>
</html>
